<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="430" viewBox="0 0 1160 430" role="img" aria-label="NarrowGate maker live hot path">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .cpp { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .py { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .cold { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 10; }
      .title { font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .sub { font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .hint { font: 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1160" height="430"/>
  <text class="title" x="36" y="44">NarrowGate live maker hot path</text>
  <text class="hint" x="36" y="68">Python keeps orchestration and I/O. C++ is useful only when the decision bundle has fixed layout and stable state.</text>

  <rect class="py" x="40" y="110" width="160" height="86"/>
  <text class="label" x="65" y="145">Market events</text>
  <text class="sub" x="60" y="168">aggTrade / depth</text>
  <text class="sub" x="74" y="187">bookTicker</text>

  <rect class="cpp" x="260" y="110" width="170" height="86"/>
  <text class="label" x="286" y="145">Signal state</text>
  <text class="sub" x="286" y="168">rolling bars</text>
  <text class="sub" x="286" y="187">fixed array features</text>

  <rect class="py" x="490" y="110" width="170" height="86"/>
  <text class="label" x="522" y="145">Main model</text>
  <text class="sub" x="526" y="168">ret / vol / toxicity</text>
  <text class="sub" x="542" y="187">LightGBM</text>

  <rect class="cpp" x="720" y="110" width="170" height="86"/>
  <text class="label" x="752" y="145">Quote core</text>
  <text class="sub" x="746" y="168">cached config</text>
  <text class="sub" x="746" y="187">compact context</text>

  <rect class="cpp" x="950" y="110" width="170" height="86"/>
  <text class="label" x="982" y="145">Routing</text>
  <text class="sub" x="982" y="168">fixed tuples</text>
  <text class="sub" x="982" y="187">action result</text>

  <path class="arrow" d="M200 153 H255"/>
  <path class="arrow" d="M430 153 H485"/>
  <path class="arrow" d="M660 153 H715"/>
  <path class="arrow" d="M890 153 H945"/>

  <rect class="py" x="720" y="265" width="170" height="78"/>
  <text class="label" x="746" y="300">Side policy</text>
  <text class="sub" x="746" y="322">guard / pause</text>
  <text class="sub" x="746" y="340">quote EV gate</text>

  <rect class="cold" x="950" y="265" width="170" height="78"/>
  <text class="label" x="990" y="300">REST I/O</text>
  <text class="sub" x="985" y="322">new / cancel</text>
  <text class="sub" x="975" y="340">logs / health</text>

  <path class="arrow" d="M805 196 V260"/>
  <path class="arrow" d="M890 304 H945"/>
  <path class="arrow dashed" d="M1035 196 V260"/>

  <text class="hint" x="260" y="226">C++ wins when state is persistent.</text>
  <text class="hint" x="720" y="226">C++ loses if each tick materializes huge dicts.</text>
  <text class="hint" x="950" y="372">Keep network and audit paths cold.</text>
</svg>
